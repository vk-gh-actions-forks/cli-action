name: Test
on: [push]

permissions:
  contents: read

jobs:
  test_action:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    name: Install the cli
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: actions/setup-node@v4
      - name: Install CLI
        uses: ./
        id: install
      - name: Test CLI
        run: doppler --version